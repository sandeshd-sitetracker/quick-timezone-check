<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IST → World Time Converter</title>
<script>
  // Apply saved theme before paint to avoid a flash. Light is the default.
  try {
    document.documentElement.setAttribute(
      "data-theme", localStorage.getItem("ist-theme") || "light"
    );
  } catch (e) {
    document.documentElement.setAttribute("data-theme", "light");
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2330;
    --border: #2a323d;
    --text: #e6edf3;
    --muted: #8b949e;
    --faint: #6e7681;
    --accent: #4cc38a;
    --green: #3fb950;
    --green-bg: rgba(63, 185, 80, 0.12);
    --red: #f85149;
    --red-bg: rgba(248, 81, 73, 0.12);
    --shadow: 0 1px 0 rgba(255,255,255,0.02), 0 8px 24px rgba(0,0,0,0.35);
    --page-bg: radial-gradient(1200px 600px at 50% -200px, #14241c 0%, #0d1117 55%);
    --btn-hover-bg: #222b39;
    --card-hover-border: #3a4452;
    --chip-bg: rgba(255,255,255,0.05);
    --input-focus: rgba(76,195,138,0.22);
    --accent-soft: rgba(76,195,138,0.10);
    --accent-border: rgba(76,195,138,0.35);
  }

  :root[data-theme="light"] {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --panel-2: #f7f8fa;
    --border: #ecedf0;
    --text: #1b1d22;
    --muted: #6b7280;
    --faint: #9aa0aa;
    --accent: #2f7d4f;
    --green: #1f8a4c;
    --green-bg: rgba(31, 138, 76, 0.12);
    --red: #d64545;
    --red-bg: rgba(214, 69, 69, 0.10);
    --shadow: 0 1px 2px rgba(16,24,40,0.04), 0 6px 20px rgba(16,24,40,0.06);
    --page-bg: radial-gradient(1200px 600px at 50% -240px, #eef0f3 0%, #f4f5f7 60%);
    --btn-hover-bg: #f0f1f4;
    --card-hover-border: #dcdee3;
    --chip-bg: rgba(16,24,40,0.04);
    --input-focus: rgba(47,125,79,0.16);
    --accent-soft: rgba(47,125,79,0.07);
    --accent-border: rgba(47,125,79,0.28);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  input, select, button, textarea { font-family: inherit; }

  body {
    font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--page-bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 64px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.01em;
    transition: background .25s ease, color .25s ease;
  }

  .container { max-width: 1080px; margin: 0 auto; }

  /* ---------- Live IST header ---------- */
  header {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 32px;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  .header-label {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 10px;
  }
  .live-clock {
    font-size: clamp(44px, 9vw, 76px);
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .live-clock .secs { color: var(--accent); }
  .live-clock .ampm { font-size: 0.4em; color: var(--muted); font-weight: 600; vertical-align: 0.35em; margin-left: 8px; }
  .header-date { margin-top: 12px; font-size: 17px; color: var(--muted); }
  .header-offset {
    display: inline-block;
    margin-top: 14px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text);
    background: var(--chip-bg);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Control ---------- */
  .control {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 32px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 18px;
    box-shadow: var(--shadow);
  }
  .control label {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
  }
  .control input[type="time"],
  .control input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 18px;
    font-weight: 600;
    padding: 10px 14px;
    font-variant-numeric: tabular-nums;
    color-scheme: dark;
  }
  .control input[type="time"] { font-size: 22px; }
  .control input[type="time"]:focus,
  .control input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--input-focus);
  }
  .control select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    padding: 11px 14px;
    cursor: pointer;
    color-scheme: dark;
  }
  .control select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--input-focus);
  }
  .control button {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .control button:hover { border-color: var(--accent); background: var(--btn-hover-bg); }

  /* ---------- IST result panel ---------- */
  .ist-result {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    background: linear-gradient(180deg, var(--accent-soft), var(--panel));
    border: 1px solid var(--accent-border);
    border-radius: 16px;
    padding: 18px 24px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }
  .ist-result-left { display: flex; align-items: center; gap: 14px; }
  .ist-result-flag { font-size: 30px; line-height: 1; }
  .ist-result-name { font-size: 15px; font-weight: 600; }
  .ist-result-context { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .ist-result-right { text-align: right; }
  .ist-result-time {
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .ist-result-time .ampm { font-size: 0.45em; color: var(--muted); font-weight: 600; margin-left: 6px; }
  .ist-result-date { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .ist-result-date .daydiff { color: var(--accent); font-weight: 600; }
  @media (max-width: 560px) {
    .ist-result-right { text-align: left; }
  }

  /* ---------- Groups & cards ---------- */
  .group { margin-bottom: 32px; }
  .group-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    box-shadow: var(--shadow);
    transition: border-color .15s, transform .15s;
  }
  .card:hover { border-color: var(--card-hover-border); transform: translateY(-2px); }
  .card.is-source {
    border-color: var(--accent);
    background: linear-gradient(180deg, var(--accent-soft), var(--panel));
  }
  .source-tag {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 4px;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-city { display: flex; align-items: center; gap: 9px; }
  .card-flag { font-size: 22px; line-height: 1; }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-sub { font-size: 12px; color: var(--faint); margin-top: 2px; }

  .badge {
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.ahead { color: var(--green); background: var(--green-bg); }
  .badge.behind { color: var(--red); background: var(--red-bg); }
  .badge.same { color: var(--muted); background: var(--chip-bg); }

  .card-time {
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .card-time .ampm { font-size: 0.45em; color: var(--muted); font-weight: 600; margin-left: 6px; }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 12px;
    gap: 8px;
  }
  .card-date { font-size: 13px; color: var(--muted); }
  .card-date .daydiff { color: var(--accent); font-weight: 600; }
  .card-offset {
    font-size: 12px;
    color: var(--faint);
    font-variant-numeric: tabular-nums;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 7px;
  }

  /* ---------- Theme toggle ---------- */
  .topbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .theme-toggle {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 15px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    box-shadow: var(--shadow);
    transition: border-color .15s, background .15s, transform .15s;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: translateY(-1px); }
  .theme-toggle .ico { font-size: 15px; line-height: 1; }

  header, .control, .ist-result, .card {
    transition: background .25s ease, border-color .25s ease, color .25s ease, transform .15s ease;
  }

  footer { text-align: center; color: var(--faint); font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
      <span class="ico" id="themeIcon">🌙</span><span id="themeLabel">Dark</span>
    </button>
  </div>

  <header>
    <div class="header-label">Current Time · India Standard Time</div>
    <div class="live-clock" id="liveClock">--:--:--</div>
    <div class="header-date" id="liveDate">—</div>
    <div class="header-offset" id="liveOffset">UTC +5:30</div>
  </header>

  <div class="control">
    <label for="istInput">When it's</label>
    <input type="time" id="istInput" step="60" />
    <label for="srcDate">on</label>
    <input type="date" id="srcDate" />
    <label for="srcZone">in</label>
    <select id="srcZone"></select>
    <button id="nowBtn" type="button">Now</button>
  </div>

  <div class="ist-result" id="istResult">
    <div class="ist-result-left">
      <span class="ist-result-flag">🇮🇳</span>
      <div>
        <div class="ist-result-name">India Standard Time</div>
        <div class="ist-result-context" id="istResultContext"></div>
      </div>
    </div>
    <div class="ist-result-right">
      <div class="ist-result-time" id="istResultTime"></div>
      <div class="ist-result-date" id="istResultDate"></div>
    </div>
  </div>

  <div id="groups"></div>

  <footer>
    Conversions computed live with <code>Intl.DateTimeFormat</code> + IANA zones — DST handled automatically.
  </footer>
</div>

<script>
  const IST = "Asia/Kolkata";

  const GROUPS = [
    {
      heading: "United States",
      flag: "🇺🇸",
      zones: [
        { name: "Eastern",  sub: "New York",          tz: "America/New_York",    flag: "🇺🇸" },
        { name: "Central",  sub: "Chicago",           tz: "America/Chicago",     flag: "🇺🇸" },
        { name: "Mountain", sub: "Denver",            tz: "America/Denver",      flag: "🇺🇸" },
        { name: "Arizona",  sub: "Phoenix · no DST",  tz: "America/Phoenix",     flag: "🇺🇸" },
        { name: "Pacific",  sub: "Los Angeles",       tz: "America/Los_Angeles", flag: "🇺🇸" },
        { name: "Alaska",   sub: "Anchorage",         tz: "America/Anchorage",   flag: "🇺🇸" },
        { name: "Hawaii",   sub: "Honolulu · no DST", tz: "Pacific/Honolulu",    flag: "🌺" },
      ],
    },
    {
      heading: "Europe",
      flag: "🇪🇺",
      zones: [
        { name: "London",         sub: "United Kingdom",        tz: "Europe/London", flag: "🇬🇧" },
        { name: "Central Europe", sub: "Paris · Berlin · Madrid", tz: "Europe/Berlin", flag: "🇪🇺" },
      ],
    },
    {
      heading: "Australia",
      flag: "🇦🇺",
      zones: [
        { name: "Sydney",  sub: "Melbourne · Sydney", tz: "Australia/Sydney", flag: "🇦🇺" },
        { name: "Perth",   sub: "Western Australia",  tz: "Australia/Perth",  flag: "🇦🇺" },
      ],
    },
  ];

  // --- Helpers -------------------------------------------------------------

  // Get the "wall clock" parts of a Date in a given IANA time zone.
  function partsInZone(date, tz) {
    const fmt = new Intl.DateTimeFormat("en-US", {
      timeZone: tz,
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hour12: false,
    });
    const p = {};
    for (const { type, value } of fmt.formatToParts(date)) p[type] = value;
    // "24" hour edge → normalize to 0
    if (p.hour === "24") p.hour = "00";
    return {
      year: +p.year, month: +p.month, day: +p.day,
      hour: +p.hour, minute: +p.minute, second: +p.second,
    };
  }

  // The UTC offset (in minutes) of a zone at a given instant.
  function offsetMinutes(date, tz) {
    const p = partsInZone(date, tz);
    const asUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute, p.second);
    return Math.round((asUTC - Math.floor(date.getTime() / 1000) * 1000) / 60000);
  }

  // Given a wall-clock (a date + chosen H:M) in some zone, produce the
  // absolute instant (a real Date) that those wall-clock numbers represent.
  function wallClockToInstant(parts, tz) {
    // Build a guess in UTC, then correct using the zone's actual offset.
    const guess = Date.UTC(
      parts.year, parts.month - 1, parts.day,
      parts.hour, parts.minute, 0
    );
    const off = offsetMinutes(new Date(guess), tz); // minutes east of UTC
    // Wall clock = UTC + offset  ⇒  UTC instant = wall - offset
    return new Date(guess - off * 60000);
  }

  function ordinalDateLabel(parts) {
    // parts from partsInZone — build a readable date using a UTC reference.
    const d = new Date(Date.UTC(parts.year, parts.month - 1, parts.day));
    return d.toLocaleDateString("en-US", {
      weekday: "short", month: "short", day: "numeric", timeZone: "UTC",
    });
  }

  function fullDateLabel(parts) {
    // Long weekday + date, for the headline IST answer.
    const d = new Date(Date.UTC(parts.year, parts.month - 1, parts.day));
    return d.toLocaleDateString("en-US", {
      weekday: "long", month: "long", day: "numeric", year: "numeric", timeZone: "UTC",
    });
  }

  function formatTime12(parts) {
    let h = parts.hour % 12;
    if (h === 0) h = 12;
    const m = String(parts.minute).padStart(2, "0");
    const ampm = parts.hour < 12 ? "AM" : "PM";
    return { main: h + ":" + m, ampm };
  }

  function zoneAbbrev(date, tz) {
    // Try short name (e.g. EDT, GMT, AEST); fall back to UTC±H:MM.
    try {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: tz, timeZoneName: "short", hour: "2-digit",
      }).formatToParts(date);
      const tzn = parts.find((p) => p.type === "timeZoneName");
      if (tzn && tzn.value && !/^GMT[+-]?$/.test(tzn.value)) return tzn.value;
    } catch (e) {}
    return offsetLabel(offsetMinutes(date, tz));
  }

  function offsetLabel(mins) {
    const sign = mins >= 0 ? "+" : "−";
    const a = Math.abs(mins);
    const h = Math.floor(a / 60);
    const m = a % 60;
    return "UTC " + sign + h + (m ? ":" + String(m).padStart(2, "0") : "");
  }

  // Difference (in minutes) of zone relative to IST at a given instant.
  function diffFromIST(date, tz) {
    return offsetMinutes(date, tz) - offsetMinutes(date, IST);
  }

  function humanizeDiff(mins) {
    if (mins === 0) return { text: "Same as IST", cls: "same" };
    const ahead = mins > 0;
    const a = Math.abs(mins);
    const h = Math.floor(a / 60);
    const m = a % 60;
    let parts = [];
    if (h) parts.push(h + "h");
    if (m) parts.push(m + "m");
    return {
      text: parts.join(" ") + (ahead ? " ahead" : " behind"),
      cls: ahead ? "ahead" : "behind",
    };
  }

  function dayDiffLabel(targetParts, istRefParts) {
    const t = Date.UTC(targetParts.year, targetParts.month - 1, targetParts.day);
    const r = Date.UTC(istRefParts.year, istRefParts.month - 1, istRefParts.day);
    const diff = Math.round((t - r) / 86400000);
    if (diff === 0) return "";
    if (diff === 1) return "next day";
    if (diff === -1) return "prev day";
    return (diff > 0 ? "+" : "") + diff + " days";
  }

  // --- Build the card DOM once --------------------------------------------

  const groupsEl = document.getElementById("groups");
  const cardRefs = [];

  for (const group of GROUPS) {
    const gEl = document.createElement("div");
    gEl.className = "group";
    gEl.innerHTML =
      '<div class="group-heading"><span>' + group.flag + "</span><span>" +
      group.heading + "</span></div>";
    const grid = document.createElement("div");
    grid.className = "grid";

    for (const z of group.zones) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="card-top">' +
          '<div class="card-city">' +
            '<span class="card-flag">' + z.flag + "</span>" +
            "<div><div class=\"card-name\">" + z.name + "</div>" +
            '<div class="card-sub">' + z.sub + "</div>" +
            '<div class="source-tag" data-tag style="display:none">↑ you entered this</div></div>' +
          "</div>" +
          '<span class="badge same" data-badge>—</span>' +
        "</div>" +
        '<div class="card-time" data-time></div>' +
        '<div class="card-bottom">' +
          '<span class="card-date" data-date></span>' +
          '<span class="card-offset" data-offset></span>' +
        "</div>";
      grid.appendChild(card);
      cardRefs.push({
        tz: z.tz,
        name: z.name,
        el: card,
        time: card.querySelector("[data-time]"),
        date: card.querySelector("[data-date]"),
        offset: card.querySelector("[data-offset]"),
        badge: card.querySelector("[data-badge]"),
        tag: card.querySelector("[data-tag]"),
      });
    }
    gEl.appendChild(grid);
    groupsEl.appendChild(gEl);
  }

  // --- Populate source-zone selector --------------------------------------

  const srcZone = document.getElementById("srcZone");
  // IST first (the home zone), then each city grouped under <optgroup>.
  const istOpt = document.createElement("option");
  istOpt.value = IST;
  istOpt.textContent = "🇮🇳 India — IST (my time)";
  srcZone.appendChild(istOpt);
  for (const group of GROUPS) {
    const og = document.createElement("optgroup");
    og.label = group.heading;
    for (const z of group.zones) {
      const opt = document.createElement("option");
      opt.value = z.tz;
      opt.textContent = z.flag + " " + z.name + " — " + z.sub;
      og.appendChild(opt);
    }
    srcZone.appendChild(og);
  }
  srcZone.value = IST;

  // --- Live IST header clock ----------------------------------------------

  const liveClock = document.getElementById("liveClock");
  const liveDate = document.getElementById("liveDate");
  const liveOffset = document.getElementById("liveOffset");

  function tickLiveClock() {
    const now = new Date();
    const p = partsInZone(now, IST);
    const t = formatTime12(p);
    const ss = String(p.second).padStart(2, "0");
    liveClock.innerHTML =
      t.main + ':<span class="secs">' + ss + '</span>' +
      '<span class="ampm">' + t.ampm + "</span>";
    liveDate.textContent = new Date(
      Date.UTC(p.year, p.month - 1, p.day)
    ).toLocaleDateString("en-US", {
      weekday: "long", year: "numeric", month: "long", day: "numeric", timeZone: "UTC",
    });
    liveOffset.textContent = offsetLabel(offsetMinutes(now, IST));
  }

  // --- Conversion render ---------------------------------------------------

  const istInput = document.getElementById("istInput");
  const srcDate = document.getElementById("srcDate");
  const istResult = document.getElementById("istResult");
  const istResultContext = document.getElementById("istResultContext");
  const istResultTime = document.getElementById("istResultTime");
  const istResultDate = document.getElementById("istResultDate");

  function render() {
    const sourceTz = srcZone.value;
    const [hh, mm] = istInput.value.split(":").map(Number);
    if (Number.isNaN(hh) || Number.isNaN(mm)) return;

    // Anchor the chosen H:M to the chosen DATE in the SOURCE zone (falling back
    // to today in that zone), then resolve that wall-clock to a real instant.
    let baseY, baseMo, baseD;
    const dp = (srcDate.value || "").split("-").map(Number);
    if (dp.length === 3 && dp.every((n) => !Number.isNaN(n))) {
      [baseY, baseMo, baseD] = dp;
    } else {
      const n = partsInZone(new Date(), sourceTz);
      baseY = n.year; baseMo = n.month; baseD = n.day;
    }
    const srcWall = {
      year: baseY, month: baseMo, day: baseD,
      hour: hh, minute: mm, second: 0,
    };
    const instant = wallClockToInstant(srcWall, sourceTz);

    // --- IST result panel (the home-zone answer) ---
    const istParts = partsInZone(instant, IST);
    const istT = formatTime12(istParts);
    istResultTime.innerHTML =
      istT.main + '<span class="ampm">' + istT.ampm + "</span>";
    const istDd = dayDiffLabel(istParts, srcWall);
    istResultDate.innerHTML = fullDateLabel(istParts) +
      " · " + zoneAbbrev(instant, IST) +
      (istDd ? ' <span class="daydiff">· ' + istDd + "</span>" : "");

    const srcEcho = formatTime12(srcWall);
    if (sourceTz === IST) {
      istResultContext.textContent = "Your selected time · " + fullDateLabel(srcWall);
    } else {
      const srcName = srcZone.options[srcZone.selectedIndex].textContent
        .replace(/^[^A-Za-z]+/, "").split(" — ")[0];
      istResultContext.textContent =
        "When it's " + srcEcho.main + " " + srcEcho.ampm +
        " on " + fullDateLabel(srcWall) + " in " + srcName;
    }

    // --- City cards: same instant, day-diff measured from the source date ---
    for (const c of cardRefs) {
      const p = partsInZone(instant, c.tz);
      const t = formatTime12(p);
      c.time.innerHTML = t.main + '<span class="ampm">' + t.ampm + "</span>";

      const dd = dayDiffLabel(p, srcWall);
      c.date.innerHTML = ordinalDateLabel(p) +
        (dd ? ' <span class="daydiff">· ' + dd + "</span>" : "");

      c.offset.textContent = zoneAbbrev(instant, c.tz);

      const diff = humanizeDiff(diffFromIST(instant, c.tz));
      c.badge.textContent = diff.text;
      c.badge.className = "badge " + diff.cls;

      // Highlight the card the user is entering time for.
      const isSource = c.tz === sourceTz;
      c.el.classList.toggle("is-source", isSource);
      c.tag.style.display = isSource ? "" : "none";
    }
  }

  function setInputToNowInSource() {
    const p = partsInZone(new Date(), srcZone.value);
    istInput.value =
      String(p.hour).padStart(2, "0") + ":" + String(p.minute).padStart(2, "0");
    srcDate.value =
      p.year + "-" + String(p.month).padStart(2, "0") + "-" + String(p.day).padStart(2, "0");
  }

  // --- Wire up -------------------------------------------------------------

  document.getElementById("nowBtn").addEventListener("click", () => {
    setInputToNowInSource();
    render();
  });
  istInput.addEventListener("input", render);
  srcDate.addEventListener("input", render);
  srcZone.addEventListener("change", render);

  // --- Theme toggle --------------------------------------------------------

  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");
  const themeLabel = document.getElementById("themeLabel");

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    // Button advertises the theme you'll switch TO.
    if (theme === "dark") {
      themeIcon.textContent = "☀️";
      themeLabel.textContent = "Light";
    } else {
      themeIcon.textContent = "🌙";
      themeLabel.textContent = "Dark";
    }
    try { localStorage.setItem("ist-theme", theme); } catch (e) {}
  }

  let savedTheme = "light";
  try { savedTheme = localStorage.getItem("ist-theme") || "light"; } catch (e) {}
  applyTheme(savedTheme);

  themeToggle.addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    applyTheme(current === "dark" ? "light" : "dark");
  });

  setInputToNowInSource();
  render();
  tickLiveClock();
  setInterval(tickLiveClock, 1000);
</script>
</body>
</html>
